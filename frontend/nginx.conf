server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — client-side routing (react-router) needs every path to
    # resolve to index.html, not a 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the backend service (name resolved via Docker
    # Compose network, or replace with your real API host in production).
    location /api/ {
        proxy_pass http://backend:4000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
