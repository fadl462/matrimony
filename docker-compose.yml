version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: matrimony
      POSTGRES_USER: matrimony
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_production}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U matrimony"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_DIALECT: postgres
      DATABASE_URL: postgres://matrimony:${POSTGRES_PASSWORD:-changeme_in_production}@db:5432/matrimony
      PGSSL: "false"
      JWT_SECRET: ${JWT_SECRET:-changeme_generate_a_real_secret}
      JWT_EXPIRES_IN: 7d
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      SMS_PROVIDER: mock
      VIDEO_STORAGE: local
      VIDEO_UPLOAD_DIR: /app/uploads/videos
      NODE_ENV: production
      PORT: 4000
    volumes:
      - video_uploads:/app/uploads/videos
    ports:
      - "4000:4000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  db_data:
  video_uploads:
